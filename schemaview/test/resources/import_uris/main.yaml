    slot_usage:
      slot_to_be_specialized:
        required: true
      attribute_to_be_specialized:
        required: true
    slots:
      - slot_to_be_used
slots:
  main_slot:
    description: This is a main slot
types:
  main_type:
    description: This is a main type
enums:
  main_enum:
    description: This is a main enum
