<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title></title>
    <script>
        var LinkML = undefined;
        const process = { cwd: () => "/" };
        import('./out/generator/js/fullLinkJS.dest/main.js').then(m => LinkML = m.LinkML)
        const convert = e => {
            const target = document.getElementById("format").value;
            const mainSchema = document.getElementById("input").value;
            const output = document.getElementById("output");

            try {
                var result = LinkML[target](mainSchema, {})
                if (target === "scala") {
                    result = Object.entries(result).reduce((a, b) => a + "//" + b[0] + "\n" + b[1], "");
                }
                output.innerHTML = result;
            } catch (e) {
                output.innerHTML = e.toString();
            }
        };
    </script>
</head>
<body>
    <label for="input">Input YAML</label> <br>
    <textarea id="input" rows="20" cols="80"></textarea><br>
    <label for="format">Generate target</label><br>
    <select id="format">
        <option value="jsonSchema">JSON Schema</option>
        <option value="shacl">SHACL</option>
        <option value="scala">Scala code</option>
        <option value="lint">Lint</option>
    </select><br>
    <button id="generate" onclick="convert()">Generate</button><br>
    <label for="output">Result:</label><br>
    <textarea id="output" rows="20" cols="80" readonly></textarea><br>
</body>
</html>
