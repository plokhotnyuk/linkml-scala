id: https://neverblink.eu/linkml/tests/syntheticUris/
name: syntheticUris

imports:
  - linkml:types

classes:
  "łączony (class)":
    tree_root: true
    slots:
      - "łączony [slot]"
      - "inny łączony \"slot\""
slots:
  "łączony [slot]":
    range: "łączony <typ>"
    required: true
    rank: 1
  "inny łączony \"slot\"":
    range: "łączony 'enum'"
    required: true
    rank: 2

types:
  "łączony <typ>":
    base: str
enums:
  "łączony 'enum'":
    permissible_values:
      "łączony {value}":
      "inny łączony \\value//":

