id: https://neverblink.eu/linkml/tests/basic/
name: basic
prefixes:
  linkml: https://w3id.org/linkml/

default_curi_maps:
  - semweb_context

imports:
  - linkml:types

classes:
  SomeClass:
    tree_root: true
    slots:
      - some_slot
      - some_other_slot
slots:
  some_slot:
    range: string
  some_other_slot:
    range: integer
    required: true