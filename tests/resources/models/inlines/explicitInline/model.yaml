id: https://neverblink.eu/linkml/tests/explicitInline/
name: explicitInline
prefixes:
  linkml: https://w3id.org/linkml/

default_curi_maps:
  - semweb_context

imports:
  - linkml:types

classes:
  SomeOtherClass:
    slots:
      - some_other_slot
  SomeClass:
    tree_root: true
    slots:
      - some_slot
slots:
  some_slot:
    range: SomeOtherClass
    inlined: true
  some_other_slot:
    range: integer
    required: true